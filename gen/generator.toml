# Clang.jl generator config for PhreeqcRM.jl.
# Run from gen/ with:
#     julia --project=. generator.jl

[general]
library_name = "libphreeqcrm"
# Resolve every `@ccall` through PhreeqcRM_jll.libphreeqcrm so the bindings work
# unchanged against either the local stub JLL or the future Yggdrasil JLL.
output_file_path = "../src/LibPhreeqcRM.jl"
module_name = "LibPhreeqcRM"
jll_pkg_name = "PhreeqcRM_jll"
prologue_file_path = "./prologue.jl"
use_julia_native_enum_type = true
print_using_CEnum = false
auto_mutability = false
output_ignorelist = []

[codegen]
use_ccall_macro = true
always_NUL_terminated_string = true
wrap_variadic_function = false
opaque_pointers = true

[codegen.macro]
# C preprocessor macros are not part of our FFI surface — IRM_RESULT is a real
# enum and the only #define we see is the DLL_EXPORT visibility attribute
# (which produces a broken Julia reference if translated). Disable wholesale.
macro_mode = "disable"
