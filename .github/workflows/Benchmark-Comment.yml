name: Benchmark PR comment
on:
  workflow_run:
    workflows: ["Benchmark (quick)"]
    types: [completed]

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: benchmark-quick-results
          path: bench-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Compose comment
        id: compose
        run: |
          set -e
          {
            echo "## Benchmark (quick)"
            if [[ -f bench-artifacts/judge_summary.md ]]; then
              cat bench-artifacts/judge_summary.md
            else
              echo "_No baseline yet — see uploaded artifacts for raw numbers._"
            fi
          } > comment.md
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          cat comment.md      >> "$GITHUB_OUTPUT"
          echo "EOF"          >> "$GITHUB_OUTPUT"
      - name: Find PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }},
            });
            const prs = run.data.pull_requests || [];
            if (prs.length === 0) { core.setFailed("no PRs"); return; }
            core.setOutput("number", prs[0].number);
      - name: Post / update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          body:         ${{ steps.compose.outputs.body }}
          edit-mode:    replace
